services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: costtracker
      POSTGRES_PASSWORD: costtracker
      POSTGRES_DB: costtracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U costtracker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
