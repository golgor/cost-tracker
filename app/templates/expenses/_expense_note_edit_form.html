<!-- Edit form for expense note (HTMX partial) -->
<div class="bg-stone-50 rounded-lg p-3 text-sm" id="note-{{ note.id }}">
    <form
        hx-post="/expenses/notes/{{ note.id }}/edit"
        hx-target="#expense-notes-{{ expense.id }}"
        hx-swap="outerHTML"
        class="space-y-2"
    >
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
        <textarea
            name="content"
            rows="3"
            class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-primary-600 focus:border-primary-600 text-sm"
            required
        >{{ note.content }}</textarea>
        <div class="flex gap-2 justify-end">
            <button
                type="button"
                class="px-3 py-1.5 text-sm text-stone-600 hover:text-stone-800"
                hx-get="/expenses/{{ expense.id }}/notes"
                hx-target="#expense-notes-{{ expense.id }}"
                hx-swap="outerHTML"
            >
                Cancel
            </button>
            <button
                type="submit"
                class="px-3 py-1.5 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700 transition-colors"
            >
                Save
            </button>
        </div>
    </form>
</div>
