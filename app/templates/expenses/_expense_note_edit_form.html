<!-- Edit form for expense note (HTMX partial) -->
<div class="p-3 bg-stone-50 border border-stone-200 rounded-lg text-sm" id="note-{{ note.id }}">
    <form hx-post="/expenses/notes/{{ note.id }}/edit"
          hx-target="#expense-notes-{{ expense.id }}"
          hx-swap="outerHTML"
          class="space-y-2">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
        <textarea name="content" rows="3" required
                  class="bg-white border border-stone-300 text-stone-900 text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full p-2.5">{{ note.content }}</textarea>
        <div class="flex gap-2 justify-end">
            <button type="button"
                    class="text-stone-600 hover:text-stone-800 font-medium rounded-lg text-xs px-3 py-2"
                    hx-get="/expenses/{{ expense.id }}/notes"
                    hx-target="#expense-notes-{{ expense.id }}"
                    hx-swap="outerHTML">Cancel</button>
            <button type="submit"
                    class="text-white bg-primary-600 hover:bg-primary-700 focus:ring-4 focus:ring-primary-200 font-medium rounded-lg text-xs px-3 py-2 focus:outline-none">Save</button>
        </div>
    </form>
</div>
