<!-- Filter Bar (collapsible) -->
<div class="bg-surface-card rounded-lg shadow-sm mb-6 overflow-hidden">
  <button
    type="button"
    class="w-full px-6 py-4 flex items-center justify-between text-left hover:bg-stone-50 transition-colors"
    onclick="document.getElementById('filter-section').classList.toggle('hidden')"
  >
    <div class="flex items-center gap-2">
      <span class="text-base font-semibold text-stone-900">Filters</span>
      {% if has_active_filters %}
        <span class="px-2 py-0.5 text-xs font-medium bg-primary-100 text-primary-700 rounded-full">Active</span>
      {% endif %}
    </div>
    <svg class="w-5 h-5 text-stone-500 transform transition-transform" id="filter-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
    </svg>
  </button>
  
  <!-- Collapsible Filter Section (hidden by default per UX-DR28) -->
  <div id="filter-section" class="hidden border-t border-stone-200 px-6 py-4">
    <form
      hx-get="/expenses/filtered"
      hx-target="#expense-feed-container"
      hx-swap="outerHTML"
      hx-push-url="true"
      class="space-y-4"
    >
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <!-- Date From -->
        <div>
          <label for="filter-date-from" class="block text-sm font-medium text-stone-700 mb-1">
            From Date
          </label>
          <input
            type="date"
            id="filter-date-from"
            name="date_from"
            value="{{ filter_date_from }}"
            class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-primary-600 focus:border-primary-600"
          >
        </div>
        
        <!-- Date To -->
        <div>
          <label for="filter-date-to" class="block text-sm font-medium text-stone-700 mb-1">
            To Date
          </label>
          <input
            type="date"
            id="filter-date-to"
            name="date_to"
            value="{{ filter_date_to }}"
            class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-primary-600 focus:border-primary-600"
          >
        </div>
        
        <!-- Paid By -->
        <div>
          <label for="filter-payer" class="block text-sm font-medium text-stone-700 mb-1">
            Paid By
          </label>
          <select
            id="filter-payer"
            name="payer_id"
            class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-primary-600 focus:border-primary-600"
          >
            <option value="">All</option>
            {% for member in group_members %}
              {% set member_user = users.get(member.user_id) %}
              {% if member_user %}
                <option
                  value="{{ member.user_id }}"
                  {% if filter_payer_id|string == member.user_id|string %}selected{% endif %}
                >
                  {{ member_user.display_name }}
                </option>
              {% endif %}
            {% endfor %}
          </select>
        </div>
      </div>
      
      <!-- Filter Actions -->
      <div class="flex items-center gap-3">
        <button
          type="submit"
          class="px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 font-medium shadow-md hover:shadow-lg active:scale-95 transition-all"
        >
          Apply Filters
        </button>
        
        {% if has_active_filters %}
          <a
            href="/expenses"
            class="px-4 py-2 border border-stone-300 text-stone-700 rounded-lg hover:bg-stone-50 font-medium transition-colors"
          >
            Clear Filters
          </a>
        {% endif %}
      </div>
    </form>
  </div>
</div>
