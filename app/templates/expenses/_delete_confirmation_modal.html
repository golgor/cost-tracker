{# Delete Confirmation Modal for Expense #}
<div
  id="delete-modal"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 htmx-swapping:opacity-0 htmx-settling:opacity-100 transition-opacity duration-150"
  onclick="if(event.target === this) { this.remove(); }"
>
  <div
    class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4 htmx-swapping:scale-95 htmx-settling:scale-100 transition-transform duration-150"
  >
    <!-- Header -->
    <div class="px-6 pt-6">
      <h3 class="text-lg font-semibold text-stone-900">Delete Expense</h3>
    </div>

    <!-- Content -->
    <div class="px-6 py-4 space-y-3">
      <p class="text-stone-700">
        Are you sure you want to delete this expense? This action cannot be undone.
      </p>
      
      <!-- Expense Details -->
      <div class="bg-stone-50 rounded-lg p-4 border border-stone-200">
        <div class="flex justify-between items-start">
          <div class="flex-1">
            <p class="font-medium text-stone-900">{{ expense.description }}</p>
            <p class="text-sm text-stone-600 mt-1">{{ expense.date.strftime("%B %d, %Y") }}</p>
          </div>
          <div class="text-right">
            <p class="text-lg font-semibold text-stone-900">{{ expense.currency }} {{ expense.amount }}</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <form method="post" action="/expenses/{{ expense.id }}/delete" class="px-6 pb-6 flex gap-3">
      <button
        type="button"
        class="flex-1 px-4 py-2 text-stone-700 text-center bg-white border border-stone-300 rounded-lg hover:bg-stone-50 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition-colors"
        onclick="document.getElementById('delete-modal').remove();"
      >
        Cancel
      </button>
      <button
        type="submit"
        class="flex-1 px-4 py-2 text-white text-center bg-red-600 rounded-lg hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 shadow-md hover:shadow-lg active:scale-95 transition-all"
      >
        Delete Expense
      </button>
    </form>
  </div>
</div>

<script>
  // Close modal on Escape key
  (function() {
    const modal = document.getElementById('delete-modal');
    if (!modal) return;
    
    const handleEscape = function(e) {
      if (e.key === 'Escape') {
        modal.remove();
        document.removeEventListener('keydown', handleEscape);
      }
    };
    document.addEventListener('keydown', handleEscape);
  })();
</script>
