{# Delete Confirmation Modal - Flowbite Modal style #}
<div id="delete-modal"
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/50"
     onclick="if(event.target === this) { this.remove(); }">
  <div class="relative p-4 w-full max-w-md max-h-full">
    <div class="relative bg-white rounded-lg shadow-lg">
      <button type="button" onclick="document.getElementById('delete-modal').remove();"
              class="absolute top-3 end-2.5 text-stone-400 bg-transparent hover:bg-stone-200 hover:text-stone-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center">
        <svg class="w-3 h-3" fill="none" viewBox="0 0 14 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/></svg>
      </button>
      <div class="p-4 md:p-5">
        <svg class="mx-auto mb-4 text-stone-400 w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
        <h3 class="mb-3 text-lg font-semibold text-stone-900 text-center">Delete Expense</h3>
        <p class="mb-4 text-sm text-stone-500 text-center">Are you sure you want to delete this expense? This action cannot be undone.</p>

        <!-- Expense Details -->
        <div class="p-3 mb-5 bg-stone-50 rounded-lg border border-stone-200">
          <div class="flex justify-between items-start">
            <div class="flex-1">
              <p class="font-medium text-stone-900">{{ expense.description }}</p>
              <p class="text-sm text-stone-600 mt-1">{{ expense.date.strftime("%B %d, %Y") }}</p>
            </div>
            <div class="text-right">
              <p class="text-lg font-semibold text-stone-900">{{ expense.currency }} {{ expense.amount }}</p>
            </div>
          </div>
        </div>

        <form method="post" action="/expenses/{{ expense.id }}/delete" class="flex gap-3">
          <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
          <button type="button" onclick="document.getElementById('delete-modal').remove();"
                  class="flex-1 text-stone-900 bg-white border border-stone-300 hover:bg-stone-100 focus:ring-4 focus:ring-stone-200 font-medium rounded-lg text-sm px-5 py-2.5 focus:outline-none">
            Cancel
          </button>
          <button type="submit"
                  class="flex-1 text-white bg-red-600 hover:bg-red-700 focus:ring-4 focus:ring-red-300 font-medium rounded-lg text-sm px-5 py-2.5 focus:outline-none">
            Delete Expense
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const modal = document.getElementById('delete-modal');
  if (!modal) return;
  const handleEscape = function(e) { if (e.key === 'Escape') { modal.remove(); document.removeEventListener('keydown', handleEscape); } };
  document.addEventListener('keydown', handleEscape);
})();
</script>
