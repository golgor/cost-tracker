<form action="/trips/{{ trip.id }}/expenses/{{ expense.id }}/edit" method="POST" class="space-y-4">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
  <div>
    <label class="block text-sm font-medium text-stone-700 mb-1">Description</label>
    <input type="text" name="description" required value="{{ expense.description }}" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
  </div>
  <div>
    <label class="block text-sm font-medium text-stone-700 mb-1">Amount</label>
    <input type="number" step="0.01" name="amount" required value="{{ expense.amount }}" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
  </div>
  <div>
    <label class="block text-sm font-medium text-stone-700 mb-1">Date</label>
    <input type="date" name="date" required value="{{ expense.date.isoformat() }}" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
  </div>
  <div>
    <label class="block text-sm font-medium text-stone-700 mb-1">Paid By</label>
    <select name="paid_by_id" required class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
      {% for p in participants %}
      <option value="{{ p.id }}" {% if p.id == expense.paid_by_id %}selected{% endif %}>{{ p.name }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="pt-4 flex justify-end gap-3">
    <button type="button" onclick="document.getElementById('editExpenseModal').close()" class="px-4 py-2 text-stone-600 hover:bg-stone-100 rounded-lg transition font-medium">Cancel</button>
    <button type="submit" class="px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition font-medium shadow-sm">Save Changes</button>
  </div>
</form>
