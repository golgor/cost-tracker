<form action="/trips/{{ trip.id }}/edit" method="POST" class="space-y-4">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
  <div>
    <label for="trip-name" class="block mb-2 text-sm font-medium text-stone-700">Trip Name</label>
    <input type="text" id="trip-name" name="name" required value="{{ trip.name }}"
           class="bg-white border border-stone-300 text-stone-900 text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full p-2.5">
  </div>

  <div>
    <label for="trip-desc" class="block mb-2 text-sm font-medium text-stone-700">Description</label>
    <textarea id="trip-desc" name="description" rows="3" placeholder="Where did we go? What did we do?"
              class="bg-white border border-stone-300 text-stone-900 text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full p-2.5">{{ trip.description or '' }}</textarea>
  </div>

  <div>
    <label class="block mb-2 text-sm font-medium text-stone-700">Date Range</label>
    <div date-rangepicker datepicker-format="yyyy-mm-dd" class="flex items-center gap-2">
      <div class="relative flex-1">
        <div class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none">
          <svg class="w-4 h-4 text-stone-500" fill="currentColor" viewBox="0 0 20 20"><path d="M20 4a2 2 0 0 0-2-2h-2V1a1 1 0 0 0-2 0v1h-3V1a1 1 0 0 0-2 0v1H6V1a1 1 0 0 0-2 0v1H2a2 2 0 0 0-2 2v2h20V4ZM0 18a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8H0v10Zm5-8h10a1 1 0 0 1 0 2H5a1 1 0 0 1 0-2Z"/></svg>
        </div>
        <input name="start_date" type="text" value="{{ trip.start_date.isoformat() if trip.start_date else '' }}" placeholder="Start date"
               class="bg-white border border-stone-300 text-stone-900 text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full ps-10 p-2.5">
      </div>
      <span class="text-stone-400 text-sm">to</span>
      <div class="relative flex-1">
        <div class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none">
          <svg class="w-4 h-4 text-stone-500" fill="currentColor" viewBox="0 0 20 20"><path d="M20 4a2 2 0 0 0-2-2h-2V1a1 1 0 0 0-2 0v1h-3V1a1 1 0 0 0-2 0v1H6V1a1 1 0 0 0-2 0v1H2a2 2 0 0 0-2 2v2h20V4ZM0 18a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8H0v10Zm5-8h10a1 1 0 0 1 0 2H5a1 1 0 0 1 0-2Z"/></svg>
        </div>
        <input name="end_date" type="text" value="{{ trip.end_date.isoformat() if trip.end_date else '' }}" placeholder="End date"
               class="bg-white border border-stone-300 text-stone-900 text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full ps-10 p-2.5">
      </div>
    </div>
  </div>

  <div>
    <label for="trip-currency" class="block mb-2 text-sm font-medium text-stone-700">Currency</label>
    <input type="text" id="trip-currency" name="currency" required value="{{ trip.currency }}"
           class="bg-white border border-stone-300 text-stone-900 text-sm rounded-lg focus:ring-primary-500 focus:border-primary-500 block w-full p-2.5">
  </div>

  <div class="pt-4 border-t border-stone-200">
    <label class="block mb-3 text-sm font-medium text-stone-700">Participants</label>
    <div class="max-h-48 overflow-y-auto space-y-2">
      {% for guest in all_guests %}
      <div class="flex items-center">
        <input id="part-{{ guest.id }}" type="checkbox" name="participant_ids" value="{{ guest.id }}"
               {% if guest.id in participant_ids %}checked{% endif %}
               class="w-4 h-4 text-primary-600 bg-stone-100 border-stone-300 rounded focus:ring-primary-500 focus:ring-2">
        <label for="part-{{ guest.id }}" class="ms-2 text-sm font-medium text-stone-700">{{ guest.name }}</label>
      </div>
      {% endfor %}
    </div>
  </div>

  <div class="pt-4 flex justify-end gap-3">
    <button type="button" data-modal-hide="editTripModal"
            class="text-stone-900 bg-white border border-stone-300 hover:bg-stone-100 focus:ring-4 focus:ring-stone-200 font-medium rounded-lg text-sm px-5 py-2.5 focus:outline-none">
      Cancel
    </button>
    <button type="submit"
            class="text-white bg-primary-600 hover:bg-primary-700 focus:ring-4 focus:ring-primary-200 font-medium rounded-lg text-sm px-5 py-2.5 focus:outline-none">
      Save Changes
    </button>
  </div>
</form>
