<form action="/trips/{{ trip.id }}/edit" method="POST" class="space-y-4">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
  <div>
    <label class="block text-sm font-medium text-stone-700 mb-1">Trip Name</label>
    <input type="text" name="name" required value="{{ trip.name }}" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
  </div>

  <div>
    <label class="block text-sm font-medium text-stone-700 mb-1">Description</label>
    <textarea name="description" rows="3" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-sm" placeholder="Where did we go? What did we do?">{{ trip.description or '' }}</textarea>
  </div>

  <div class="grid grid-cols-2 gap-3">
    <div>
      <label class="block text-sm font-medium text-stone-700 mb-1">Start Date</label>
      <input datepicker datepicker-format="yyyy-mm-dd" type="text" name="start_date" value="{{ trip.start_date.isoformat() if trip.start_date else '' }}" placeholder="Start date" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-sm">
    </div>
    <div>
      <label class="block text-sm font-medium text-stone-700 mb-1">End Date</label>
      <input datepicker datepicker-format="yyyy-mm-dd" type="text" name="end_date" value="{{ trip.end_date.isoformat() if trip.end_date else '' }}" placeholder="End date" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-sm">
    </div>
  </div>

  <div>
    <label class="block text-sm font-medium text-stone-700 mb-1">Currency</label>
    <input type="text" name="currency" required value="{{ trip.currency }}" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
  </div>

  <div class="pt-4 border-t border-stone-200">
    <label class="block text-sm font-medium text-stone-700 mb-3">Participants</label>
    <div class="max-h-48 overflow-y-auto space-y-2">
      {% for guest in all_guests %}
      <label class="flex items-center gap-2 cursor-pointer hover:bg-stone-50 p-1.5 rounded">
        <input type="checkbox" name="participant_ids" value="{{ guest.id }}"
               {% if guest.id in participant_ids %}checked{% endif %}
               class="rounded border-stone-300 text-primary-600 focus:ring-primary-500">
        <span class="text-sm text-stone-700">{{ guest.name }}</span>
      </label>
      {% endfor %}
    </div>
  </div>

  <div class="pt-4 flex justify-end gap-3">
    <button type="button" onclick="document.getElementById('editTripModal').close()" class="px-4 py-2 text-stone-600 hover:bg-stone-100 rounded-lg transition font-medium">Cancel</button>
    <button type="submit" class="px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition font-medium shadow-sm">Save Changes</button>
  </div>
</form>
