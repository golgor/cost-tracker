{% for guest in guests %}
<div class="flex items-center p-2 hover:bg-stone-50 rounded-lg">
  <input id="guest-cb-{{ guest.id }}" type="checkbox" name="participant_ids" value="{{ guest.id }}" {% if guest.id in selected_ids %}checked{% endif %}
         class="w-4 h-4 text-primary-600 bg-stone-100 border-stone-300 rounded focus:ring-primary-500 focus:ring-2">
  <label for="guest-cb-{{ guest.id }}" class="ms-2 text-sm font-medium text-stone-700 cursor-pointer">{{ guest.name }}</label>
</div>
{% else %}
<p class="text-sm text-stone-500 italic p-2">No global guests created yet.</p>
{% endfor %}
