{% extends "base.html" %}

{% block title %}Recurring Costs - Cost Tracker{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <!-- Page header -->
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-xl font-semibold text-stone-800">Recurring Costs</h1>
    <a
      href="/recurring/new"
      class="px-4 py-2 bg-primary-500 text-white rounded-lg hover:bg-primary-600 focus-ring touch-target inline-flex items-center gap-2 font-medium transition-colors text-sm"
    >
      + Add Recurring
    </a>
  </div>

  <!-- Tabs -->
  <div class="flex gap-1 mb-4 border-b border-stone-200">
    <button
      class="px-4 py-2 text-sm font-medium rounded-t-lg transition-colors {% if active_tab == 'active' %}bg-white border border-b-white border-stone-200 text-stone-900 -mb-px{% else %}text-stone-600 hover:text-stone-800{% endif %}"
      hx-get="/recurring/tab/active"
      hx-target="#definition-list"
      hx-swap="innerHTML"
      hx-push-url="false"
    >
      Active
    </button>
    <button
      class="px-4 py-2 text-sm font-medium rounded-t-lg transition-colors {% if active_tab == 'paused' %}bg-white border border-b-white border-stone-200 text-stone-900 -mb-px{% else %}text-stone-600 hover:text-stone-800{% endif %}"
      hx-get="/recurring/tab/paused"
      hx-target="#definition-list"
      hx-swap="innerHTML"
      hx-push-url="false"
    >
      Paused
    </button>
  </div>

  <!-- Definition list (swappable via HTMX tab switching and filters) -->
  <div id="definition-list">
    {% include "recurring/_definition_list.html" %}
  </div>
</div>

{% include "recurring/_delete_modal.html" %}
{% endblock %}
