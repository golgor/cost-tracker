<!-- Filter chips — Flowbite Badge style buttons for scope and category -->
<div class="flex flex-wrap gap-2 mb-4" id="filter-chips">
  <button
    class="text-xs font-medium px-3 py-1.5 rounded-full border transition-colors {% if active_scope == 'all' and not active_category %}border-primary-300 bg-primary-50 text-primary-700{% else %}border-stone-300 bg-white text-stone-600 hover:bg-stone-100{% endif %}"
    hx-get="/recurring/filtered?scope=all&tab={{ active_tab }}"
    hx-target="#definition-list"
    hx-swap="innerHTML"
    hx-push-url="false"
  >All</button>

  <button
    class="text-xs font-medium px-3 py-1.5 rounded-full border transition-colors {% if active_scope == 'shared' %}border-primary-300 bg-primary-50 text-primary-700{% else %}border-stone-300 bg-white text-stone-600 hover:bg-stone-100{% endif %}"
    hx-get="/recurring/filtered?scope=shared&tab={{ active_tab }}"
    hx-target="#definition-list"
    hx-swap="innerHTML"
    hx-push-url="false"
  >Shared</button>

  <button
    class="text-xs font-medium px-3 py-1.5 rounded-full border transition-colors {% if active_scope == 'personal' %}border-primary-300 bg-primary-50 text-primary-700{% else %}border-stone-300 bg-white text-stone-600 hover:bg-stone-100{% endif %}"
    hx-get="/recurring/filtered?scope=personal&tab={{ active_tab }}"
    hx-target="#definition-list"
    hx-swap="innerHTML"
    hx-push-url="false"
  >Personal</button>

  {% for cat in active_categories %}
    <button
      class="text-xs font-medium px-3 py-1.5 rounded-full border transition-colors capitalize {% if active_category == cat %}border-primary-300 bg-primary-50 text-primary-700{% else %}border-stone-300 bg-white text-stone-600 hover:bg-stone-100{% endif %}"
      hx-get="/recurring/filtered?scope=all&category={{ cat | urlencode }}&tab={{ active_tab }}"
      hx-target="#definition-list"
      hx-swap="innerHTML"
      hx-push-url="false"
    >{{ cat }}</button>
  {% endfor %}
</div>
