<!-- Filter chips — Flowbite Badge style buttons for scope and category -->
<div class="flex flex-wrap gap-2 mb-4" id="filter-chips">
  <button
    class="text-xs font-medium px-3 py-1.5 rounded-full border border-stone-300 bg-white text-stone-600 hover:bg-stone-100 transition-colors"
    hx-get="/recurring/filtered?scope=all"
    hx-target="#definition-list"
    hx-swap="innerHTML"
    hx-push-url="false"
  >All</button>

  <button
    class="text-xs font-medium px-3 py-1.5 rounded-full border border-stone-300 bg-white text-stone-600 hover:bg-stone-100 transition-colors"
    hx-get="/recurring/filtered?scope=shared"
    hx-target="#definition-list"
    hx-swap="innerHTML"
    hx-push-url="false"
  >Shared</button>

  <button
    class="text-xs font-medium px-3 py-1.5 rounded-full border border-pink-300 bg-white text-pink-600 hover:bg-pink-50 transition-colors"
    hx-get="/recurring/filtered?scope=personal"
    hx-target="#definition-list"
    hx-swap="innerHTML"
    hx-push-url="false"
  >Personal</button>

  {% for cat in active_categories %}
    <button
      class="text-xs font-medium px-3 py-1.5 rounded-full border border-indigo-200 bg-white text-indigo-600 hover:bg-indigo-50 transition-colors capitalize"
      hx-get="/recurring/filtered?category={{ cat | urlencode }}"
      hx-target="#definition-list"
      hx-swap="innerHTML"
      hx-push-url="false"
    >{{ cat }}</button>
  {% endfor %}
</div>
