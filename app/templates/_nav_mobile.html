<!-- Mobile bottom navigation - Flowbite Bottom Navigation, visible below md breakpoint (768px) -->
<div class="md:hidden fixed bottom-0 left-0 z-50 w-full h-16 bg-surface-card border-t border-stone-200 safe-area-inset-bottom">
  <div class="grid h-full max-w-lg grid-cols-5 mx-auto">
    <!-- Expenses -->
    <a href="/expenses" class="inline-flex flex-col items-center justify-center px-2 hover:bg-stone-50 group">
      <svg class="w-5 h-5 mb-1 {% if request.url.path.startswith('/expenses') %}text-primary-500{% else %}text-stone-500 group-hover:text-primary-500{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      <span class="text-xs {% if request.url.path.startswith('/expenses') %}text-primary-500{% else %}text-stone-500 group-hover:text-primary-500{% endif %}">Expenses</span>
    </a>

    <!-- Recurring -->
    <a href="/recurring" class="inline-flex flex-col items-center justify-center px-2 hover:bg-stone-50 group">
      <svg class="w-5 h-5 mb-1 {% if request.url.path.startswith('/recurring') %}text-primary-500{% else %}text-stone-500 group-hover:text-primary-500{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      <span class="text-xs {% if request.url.path.startswith('/recurring') %}text-primary-500{% else %}text-stone-500 group-hover:text-primary-500{% endif %}">Recurring</span>
    </a>

    <!-- FAB - Add Expense (center) -->
    <div class="flex items-center justify-center">
      <button type="button" class="inline-flex items-center justify-center w-10 h-10 font-medium bg-primary-500 rounded-full hover:bg-primary-600 group focus:ring-4 focus:ring-primary-200 focus:outline-none" aria-label="Add expense" hx-disabled-elt="this">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
      </button>
    </div>

    <!-- Trips -->
    <a href="/trips" class="inline-flex flex-col items-center justify-center px-2 hover:bg-stone-50 group">
      <svg class="w-5 h-5 mb-1 {% if request.url.path.startswith('/trips') %}text-primary-500{% else %}text-stone-500 group-hover:text-primary-500{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span class="text-xs {% if request.url.path.startswith('/trips') %}text-primary-500{% else %}text-stone-500 group-hover:text-primary-500{% endif %}">Trips</span>
    </a>

    <!-- Settlements -->
    <a href="/settlements" class="inline-flex flex-col items-center justify-center px-2 hover:bg-stone-50 group">
      <svg class="w-5 h-5 mb-1 {% if '/settlements' in request.url.path %}text-primary-500{% else %}text-stone-500 group-hover:text-primary-500{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span class="text-xs {% if '/settlements' in request.url.path %}text-primary-500{% else %}text-stone-500 group-hover:text-primary-500{% endif %}">Settle</span>
    </a>
  </div>
</div>
