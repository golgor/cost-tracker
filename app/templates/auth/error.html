{% extends "base.html" %}

{% block title %}Login Error - Cost Tracker{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="w-full max-w-sm">
    <!-- Flowbite Alert - Danger -->
    <div class="p-4 mb-4 text-sm text-red-800 rounded-lg bg-red-50 border border-red-200" role="alert">
      <div class="flex items-center mb-2">
        <svg class="shrink-0 w-4 h-4 me-2" fill="currentColor" viewBox="0 0 20 20"><path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9.5 4a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 15H8a1 1 0 0 1 0-2h1v-3H8a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1v4h1a1 1 0 0 1 0 2Z"/></svg>
        <span class="font-medium">Login Failed</span>
      </div>
      There was a problem signing you in. Please try again.
    </div>

    <div class="p-6 bg-white border border-stone-200 rounded-lg shadow-sm text-center">
      <a href="/auth/login"
         class="w-full text-white bg-primary-500 hover:bg-primary-600 focus:ring-4 focus:ring-primary-200 font-medium rounded-lg text-sm px-5 py-3 focus:outline-none inline-flex items-center justify-center gap-2 transition-colors">
        Try again
      </a>
    </div>
  </div>
</div>
{% endblock %}
