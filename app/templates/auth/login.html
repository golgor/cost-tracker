{% extends "base.html" %}

{% block title %}Login - Cost Tracker{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">

    <h1 class="text-2xl font-semibold text-stone-900 mb-4">Welcome to Cost Tracker</h1>
    <p class="text-stone-600 mb-6">Sign in with your Authentik account to continue.</p>
    
    <a href="/auth/login"

      Login with Authentik
