{% extends "base.html" %}

{% block title %}Login - Cost Tracker{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="w-full max-w-sm p-6 bg-white border border-stone-200 rounded-lg shadow-sm text-center">
    <h1 class="mb-4 text-2xl font-semibold text-stone-900">Welcome to Cost Tracker</h1>
    <p class="mb-6 text-sm text-stone-600">Sign in with your Authentik account to continue.</p>

    <a href="/auth/login"
       class="w-full text-white bg-primary-500 hover:bg-primary-600 focus:ring-4 focus:ring-primary-200 font-medium rounded-lg text-sm px-5 py-3 focus:outline-none inline-flex items-center justify-center gap-2 transition-colors">
      Login with Authentik
    </a>
  </div>
</div>
{% endblock %}
