<!-- Desktop top navigation - visible at md breakpoint (768px+) -->
<nav class="hidden md:flex items-center justify-between px-8 py-4 bg-surface-card shadow-sm border-b border-stone-200" aria-label="Main navigation">
  <!-- Logo placeholder -->
  <div class="flex items-center gap-8">
    <a href="/" class="text-xl font-semibold text-primary-500 focus-ring rounded-lg px-2 py-1">
      Cost Tracker
    </a>

    <!-- Navigation items -->
    <div class="flex items-center gap-1">
      <a href="/" class="px-4 py-2 rounded-lg text-stone-600 hover:bg-stone-100 hover:text-stone-900 focus-ring touch-target flex items-center justify-center transition-colors">
        Dashboard
      </a>
      <a href="/expenses" class="px-4 py-2 rounded-lg text-stone-600 hover:bg-stone-100 hover:text-stone-900 focus-ring touch-target flex items-center justify-center transition-colors">
        Expenses
      </a>
      <a href="/recurring" class="px-4 py-2 rounded-lg text-stone-600 hover:bg-stone-100 hover:text-stone-900 focus-ring touch-target flex items-center justify-center transition-colors">
        Recurring
      </a>
      <a href="/settlements" class="px-4 py-2 rounded-lg text-stone-600 hover:bg-stone-100 hover:text-stone-900 focus-ring touch-target flex items-center justify-center transition-colors">
        Settlements
      </a>
    </div>
  </div>

  <!-- Right side: Add button and user area -->
  <div class="flex items-center gap-4">
    <!-- + Add Expense button placeholder -->
    <button type="button" class="px-4 py-2 bg-primary-500 text-white rounded-lg hover:bg-primary-600 focus-ring touch-target flex items-center justify-center gap-2 font-medium transition-colors" hx-disabled-elt="this">
      <span aria-hidden="true">+</span> Add Expense
    </button>

    <!-- User badge with logout dropdown -->
    <div class="relative group">
      <button type="button" class="flex items-center gap-2 px-3 py-2 rounded-lg bg-stone-100 hover:bg-stone-200 focus-ring transition-colors">
        <div class="w-8 h-8 rounded-full bg-primary-200 flex items-center justify-center text-primary-700 text-sm font-medium">
          {{ user.display_name[0] | upper if user else 'U' }}
        </div>
        <span class="text-stone-700 text-sm">{{ user.display_name if user else 'User' }}</span>
        <svg class="w-4 h-4 text-stone-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
      <!-- Dropdown menu -->
      <div class="absolute right-0 mt-1 w-48 bg-white rounded-lg shadow-lg border border-stone-200 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50">
        <a href="/auth/logout" class="block px-4 py-3 text-stone-700 hover:bg-stone-50 rounded-lg transition-colors">
          Logout
        </a>
      </div>
    </div>
  </div>
</nav>
