<!-- Desktop top navigation - Flowbite Navbar, visible at md breakpoint (768px+) -->
<nav class="hidden md:block bg-surface-card border-b border-stone-200 shadow-sm">
  <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto px-8 py-3">
    <!-- Logo -->
    <a href="/" class="flex items-center space-x-2">
      <span class="self-center text-xl font-semibold whitespace-nowrap text-primary-500">Cost Tracker</span>
    </a>

    <!-- Right side: User dropdown -->
    <div class="flex items-center md:order-2 space-x-3">
      <button type="button" class="flex items-center gap-2 text-sm rounded-lg px-3 py-2 bg-stone-100 hover:bg-stone-200 focus:ring-4 focus:ring-primary-100 transition-colors" id="user-menu-button" data-dropdown-toggle="user-dropdown" data-dropdown-placement="bottom-end">
        <div class="w-8 h-8 rounded-full bg-primary-200 flex items-center justify-center text-primary-700 text-sm font-medium">
          {{ user.display_name[0]|upper if user and user.display_name else 'U' }}
        </div>
        <span class="text-stone-700 text-sm">{{ user.display_name if user and user.display_name else 'User' }}</span>
        <svg class="w-4 h-4 text-stone-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>

      <!-- Dropdown menu -->
      <div class="z-50 hidden my-4 text-base list-none bg-white divide-y divide-stone-100 rounded-lg shadow-lg border border-stone-200" id="user-dropdown">
        <div class="px-4 py-3">
          <span class="block text-sm text-stone-900">{{ user.display_name if user and user.display_name else 'User' }}</span>
        </div>
        <ul class="py-2">
          <li>
            <a href="/admin/users" class="block px-4 py-2 text-sm text-stone-700 hover:bg-stone-100">Users</a>
          </li>
          <li>
            <a href="/auth/logout" class="block px-4 py-2 text-sm text-stone-700 hover:bg-stone-100">Logout</a>
          </li>
        </ul>
      </div>
    </div>

    <!-- Navigation links -->
    <div class="items-center justify-between flex w-auto order-1">
      <ul class="flex flex-row font-medium space-x-1 mt-0 border-0">
        <li>
          <a href="/expenses" class="block py-2 px-3 rounded-lg transition-colors{% if request.url.path.startswith('/expenses') %} text-primary-600 bg-primary-50 font-medium{% else %} text-stone-600 hover:bg-stone-100 hover:text-stone-900{% endif %}">Expenses</a>
        </li>
        <li>
          <a href="/trips" class="block py-2 px-3 rounded-lg transition-colors{% if request.url.path.startswith('/trips') %} text-primary-600 bg-primary-50 font-medium{% else %} text-stone-600 hover:bg-stone-100 hover:text-stone-900{% endif %}">Trips</a>
        </li>
        <li>
          <a href="/recurring" class="block py-2 px-3 rounded-lg transition-colors{% if request.url.path.startswith('/recurring') %} text-primary-600 bg-primary-50 font-medium{% else %} text-stone-600 hover:bg-stone-100 hover:text-stone-900{% endif %}">Recurring</a>
        </li>
        <li>
          <a href="/settlements" class="block py-2 px-3 rounded-lg transition-colors{% if '/settlements' in request.url.path %} text-primary-600 bg-primary-50 font-medium{% else %} text-stone-600 hover:bg-stone-100 hover:text-stone-900{% endif %}">Settlements</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
