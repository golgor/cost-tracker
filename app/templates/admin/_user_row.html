<tr class="hover:bg-stone-50 user-row" id="user-row-{{ u.id }}" data-status="{{ u.status_filter }}">
  <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-stone-900">
    {{ u.display_name }}
  </td>
  <td class="px-6 py-4 whitespace-nowrap text-sm text-stone-600">
    {{ u.email }}
  </td>
  <td class="px-6 py-4 whitespace-nowrap">
    <span class="inline-flex px-2 py-1 text-xs font-medium rounded-full {{ u.role_badge_color }}">
      {{ u.role_label }}
    </span>
  </td>
  <td class="px-6 py-4 whitespace-nowrap">
    <span class="inline-flex px-2 py-1 text-xs font-medium rounded-full {{ u.status_badge_color }}">
      {{ u.status_label }}
    </span>
  </td>
  <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
    <div class="flex justify-end gap-2">
      {% if u.show_promote %}
      <button
        hx-post="/admin/users/{{ u.id }}/promote"
        hx-swap="outerHTML"
        hx-target="closest tr"
        class="px-3 py-1 text-sm bg-stone-100 text-stone-700 rounded hover:bg-stone-200 focus-ring">
        Promote
      </button>
      {% endif %}
      {% if u.show_demote %}
      <button
        hx-post="/admin/users/{{ u.id }}/demote"
        hx-swap="outerHTML"
        hx-target="closest tr"
        class="px-3 py-1 text-sm bg-stone-100 text-stone-700 rounded hover:bg-stone-200 focus-ring">
        Demote
      </button>
      {% endif %}
      {% if u.show_deactivate %}
      <button
        hx-get="/admin/users/{{ u.id }}/deactivate-confirm"
        hx-target="#modal-container"
        class="px-3 py-1 text-sm bg-red-100 text-red-700 rounded hover:bg-red-200 focus-ring">
        Deactivate
      </button>
      {% endif %}
      {% if u.show_reactivate %}
      <button
        hx-post="/admin/users/{{ u.id }}/reactivate"
        hx-swap="outerHTML"
        hx-target="closest tr"
        class="px-3 py-1 text-sm bg-primary-500 text-white rounded hover:bg-primary-600 focus-ring">
        Reactivate
      </button>
      {% endif %}
    </div>
  </td>
</tr>
