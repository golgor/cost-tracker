{% extends "base.html" %}

{% block title %}User Management - Cost Tracker{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto">
  <h1 class="mb-6 text-3xl font-semibold text-stone-900">Users</h1>

  <!-- Flowbite Table -->
  <div class="relative overflow-x-auto shadow-sm rounded-lg border border-stone-200">
    <table class="w-full text-sm text-left text-stone-500" style="table-layout: fixed;">
      <thead class="text-xs text-stone-700 uppercase bg-stone-50">
        <tr>
          <th scope="col" class="px-6 py-3" style="width: 40%;">Name</th>
          <th scope="col" class="px-6 py-3" style="width: 60%;">Email</th>
        </tr>
      </thead>
      <tbody>
        {% for u in users %}
        {% include "admin/_user_row.html" %}
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
