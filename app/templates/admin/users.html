{% extends "base.html" %}

{% block title %}User Management - Cost Tracker{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto">
  <h1 class="text-3xl font-semibold text-stone-900 mb-6">Users</h1>

  <div class="bg-surface-card rounded-lg shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full" style="table-layout: fixed;">
        <thead class="bg-stone-50 border-b border-stone-200">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-stone-700 uppercase tracking-wider" style="width: 40%;">Name</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-stone-700 uppercase tracking-wider" style="width: 60%;">Email</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-stone-200">
          {% for u in users %}
          {% include "admin/_user_row.html" %}
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
