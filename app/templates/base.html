<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cost Tracker - Household expense sharing made simple">
  <meta name="csrf-token" content="{{ csrf_token | default('') }}">
  <title>{% block title %}Cost Tracker{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/output.css') }}">
  <script src="{{ url_for('static', path='js/htmx.min.js') }}" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.body.addEventListener('htmx:configRequest', function(event) {
        var csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        if (csrfToken) {
          event.detail.headers['X-CSRF-Token'] = csrfToken;
        }
      });
    });
  </script>
</head>
<body class="min-h-screen flex flex-col">
  <!-- Skip to content link for keyboard users -->
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-50 bg-primary-500 text-white px-4 py-2 rounded-lg focus-ring">
    Skip to content
  </a>

  <!-- Desktop navigation (768px+) -->
  {% include "_nav_desktop.html" %}

  <!-- Main content area -->
  <main id="main-content" class="flex-1 px-4 py-6 md:px-8 md:py-8 pb-24 md:pb-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Mobile navigation (below 768px) -->
  {% include "_nav_mobile.html" %}
</body>
</html>
