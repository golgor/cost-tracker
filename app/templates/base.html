<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cost Tracker - Household expense sharing made simple">
  <meta name="csrf-token" content="{{ csrf_token | default('') }}">
  <title>{% block title %}Cost Tracker{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/output.css">
  <script src="/static/js/htmx.min.js" defer></script>
  <script src="/static/js/flowbite.min.js" defer></script>
  <script src="/static/js/components/date-range-picker.js" defer></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      document.body.addEventListener("htmx:configRequest", function (event) {
        var csrfToken = document.querySelector("meta[name='csrf-token']").getAttribute("content");
        if (csrfToken) {
          event.detail.headers["X-CSRF-Token"] = csrfToken;
        }
      });

      document.body.addEventListener("htmx:afterSettle", function (event) {
        var root = event.detail && event.detail.elt ? event.detail.elt : event.target;
        if (!(root instanceof Element)) return;

        if (typeof initFlowbite === "function") {
          initFlowbite();
        }

        if (typeof window.initCostTrackerDateRangePickers === "function") {
          window.initCostTrackerDateRangePickers(root);
        }
      });
    });
  </script>
</head>
<body class="min-h-screen flex flex-col">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-50 bg-primary-500 text-white px-4 py-2 rounded-lg focus-ring">
    Skip to content
  </a>

  {% include "_nav_desktop.html" %}

  <main id="main-content" class="flex-1 {% block main_class %}px-4 py-6 md:px-8 md:py-8 pb-24 md:pb-8{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  {% include "_nav_mobile.html" %}
</body>
</html>
