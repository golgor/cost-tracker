name: Code

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: ruff check
        run: uv run ruff check app/ tests/

      - name: ruff format check
        run: uv run ruff format --check app/ tests/

      - name: ty type check
        run: uv run ty check app/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: costtracker
          POSTGRES_PASSWORD: costtracker
          POSTGRES_DB: costtracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run unit tests
        run: uv run pytest tests/ -v --ignore=tests/integration
        env:
          DATABASE_URL: postgresql://costtracker:costtracker@localhost:5432/costtracker

  integration-test:
    name: Integration Tests (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: costtracker
          POSTGRES_PASSWORD: costtracker
          POSTGRES_DB: costtracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run migrations
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql://costtracker:costtracker@localhost:5432/costtracker

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v
        env:
          DATABASE_URL: postgresql://costtracker:costtracker@localhost:5432/costtracker
          TEST_DATABASE_URL: postgresql://costtracker:costtracker@localhost:5432/costtracker
