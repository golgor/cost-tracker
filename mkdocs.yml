site_name: Cost Tracker
site_description: Self-hosted household expense-sharing app documentation
repo_url: https://github.com/golgor/cost-tracker
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.integrate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - User Guide:
    - user-guide/index.md
    - Getting Started: user-guide/getting-started.md
    - Features: user-guide/features.md
    - FAQ: user-guide/faq.md
  - Operations:
    - operations/index.md
    - Installation: operations/installation.md
    - Configuration: operations/configuration.md
    - Deployment: operations/deployment.md
    - Authentication: operations/authentication.md
    - Database: operations/database.md
    - Upgrading: operations/upgrading.md
    - Troubleshooting: operations/troubleshooting.md
  - Development:
    - development/index.md
    - Local Setup: development/setup.md
    - Conventions: development/conventions.md
    - Testing: development/testing.md
    - How-To Guides:
      - Add a Domain Entity: development/how-to/add-domain-entity.md
      - Add a Route: development/how-to/add-route.md
      - Add a Migration: development/how-to/add-migration.md
  - Architecture:
    - architecture/index.md
    - Core Decisions: architecture/core-architectural-decisions.md
    - Project Structure: architecture/project-structure-boundaries.md
    - Implementation Patterns: architecture/implementation-patterns-consistency-rules.md
    - Settlement Patterns: architecture/settlement-patterns.md
    - Project Context: architecture/project-context-analysis.md
  - Design Records:
    - design/index.md
    - UX Design:
      - design/ux/executive-summary.md
      - design/ux/core-user-experience.md
      - design/ux/defining-core-experience.md
      - design/ux/desired-emotional-response.md
      - design/ux/design-direction-decision.md
      - design/ux/design-system-foundation.md
      - design/ux/visual-design-foundation.md
      - design/ux/user-journey-flows.md
      - design/ux/ux-pattern-analysis-inspiration.md
      - design/ux/filter-bar-date-picker.md
      - design/ux/admin-interface.md
    - Architecture Evaluations:
      - design/architecture/starter-template-evaluation.md
      - design/architecture/architecture-validation-results.md
    - Implementation Specs:
      - design/specs/refactor_balance_calculation.md
